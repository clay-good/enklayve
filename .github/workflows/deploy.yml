name: Deploy

# Deploy to Cloudflare Workers Static Assets on merge to main, but only after
# the full quality gate passes — so the live site never drifts behind main
# (BUILD-SPEC.md §6, §10). Requires two repository secrets:
#   - CLOUDFLARE_API_TOKEN   (a token with Workers Scripts: Edit)
#   - CLOUDFLARE_ACCOUNT_ID
on:
  push:
    branches: [main]

# Never run two deploys at once; cancel an in-flight deploy if a newer commit lands.
concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Expose the token to the `if:` guard below so the deploy step is *skipped*
    # (not failed) until the repository secrets are configured — the workflow
    # stays green now, and starts deploying automatically the moment they exist.
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run audit
      - name: Deploy to Cloudflare
        if: ${{ env.CF_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
