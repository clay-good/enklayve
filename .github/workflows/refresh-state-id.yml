# Idaho income tax — Idaho State Tax Commission flat rate, annual (staggered). Flat-rate state, the PA workflow is the template. BUILD-SPEC.md §7.2, §8.
name: Refresh Idaho income tax

on:
  schedule:
    - cron: "0 12 8 4 *"
  workflow_dispatch:

jobs:
  refresh:
    uses: ./.github/workflows/_data-refresh.yml
    with:
      group: state-id
      source_name: Idaho income tax
