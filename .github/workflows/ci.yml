name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Run the bundled JS actions (checkout, setup-node) on Node 24 ahead of
# GitHub's mid-2026 default switch, silencing the Node 20 deprecation notice.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24 runs the TypeScript build scripts (audit, manifest) directly
          # via native type stripping, and matches .nvmrc.
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      # Family invariants gate (BUILD-SPEC.md §10): CSP connect-src 'none', no
      # cross-origin resource loads, every rule cited, no sensitive persistence.
      # Runs after the build so it can inspect dist/. Fails on any violation.
      - run: npm run audit

  # End-to-end (BUILD-SPEC.md §6/§10/§11): a real browser over the production
  # build verifies layout (no horizontal scroll on any view at any device
  # width), the offline service worker, and the deep-link → compute path —
  # things happy-dom cannot. Kept a separate job so the unit suite stays fast.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
